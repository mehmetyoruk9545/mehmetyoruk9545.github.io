<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FOR YOU | Financial Command Center v1.2</title>
    <style>
        :root { --gold: #d4af37; --bg: #02050a; --glass: rgba(10, 10, 15, 0.95); --green: #28a745; --red: #dc3545; }
        body { background: #02050a; color: #fff; font-family: 'Garamond', serif; margin: 0; padding: 20px; min-height: 100vh; position: relative; background-image: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%); background-attachment: fixed; }
        .nav-controls { position: fixed; top: 15px; left: 25px; z-index: 2000; display: flex; gap: 10px; }
        .n-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); color: var(--gold); padding: 6px 15px; cursor: pointer; font-size: 10px; border-radius: 4px; backdrop-filter: blur(5px); }
        .finance-matrix { max-width: 1450px; margin: 40px auto 20px auto; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; background: var(--glass); box-shadow: 0 0 50px rgba(0,0,0,1); backdrop-filter: blur(10px); }
        .tab-menu { display: flex; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--gold); }
        .tab-link { padding: 18px 25px; border: none; background: none; color: #555; cursor: pointer; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        .tab-link.active { color: var(--gold); background: rgba(212, 175, 55, 0.1); border-bottom: 3px solid var(--gold); }
        .tab-content { display: none; padding: 35px; }
        .tab-content.active { display: block; }
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .summary-card { padding: 20px; border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 8px; background: rgba(212, 175, 55, 0.02); text-align: center; }
        .card-val { font-size: 20px; color: var(--gold); font-weight: bold; margin-top: 10px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { color: var(--gold); font-size: 10px; text-align: left; padding: 15px; border-bottom: 1px solid #222; background: rgba(0,0,0,0.5); }
        input { background: rgba(0,0,0,0.7); border: 1px solid #222; padding: 10px; color: #fff; width: 100%; box-sizing: border-box; border-radius: 4px; }
        .lang-panel { position: fixed; top: 15px; right: 25px; z-index: 2000; }
        .l-btn { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 6px 12px; cursor: pointer; font-size: 10px; margin-left: 4px; }
        .save-btn { width: 100%; padding: 22px; background: rgba(212,175,55,0.05); border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-weight: bold; letter-spacing: 5px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="nav-controls">
        <button class="n-btn" onclick="location.href='index.html'" data-key="nav_home"></button>
        <button class="n-btn" onclick="location.href='fy-admin-hq.html'" data-key="nav_hq"></button>
    </div>

    <div class="lang-panel">
        <button class="l-btn active" onclick="setLang('tr')">TR</button>
        <button class="l-btn" onclick="setLang('en')">EN</button>
        <button class="l-btn" onclick="setLang('zh')">ZH</button>
        <button class="l-btn" onclick="setLang('ar')">AR</button>
        <button class="l-btn" onclick="setLang('ru')">RU</button>
        <button class="l-btn" onclick="setLang('de')">DE</button>
        <button class="l-btn" onclick="setLang('fr')">FR</button>
        <button class="l-btn" onclick="setLang('es')">ES</button>
    </div>

    <div class="finance-matrix">
        <div class="tab-menu">
            <button class="tab-link active" onclick="openTab(event, 'payroll')" data-key="tab_payroll"></button>
            <button class="tab-link" onclick="openTab(event, 'severance')" data-key="tab_severance"></button>
            <button class="tab-link" onclick="openTab(event, 'deductions')" data-key="tab_deductions"></button>
        </div>

        <div id="payroll" class="tab-content active">
            <div class="summary-grid">
                <div class="summary-card"><div class="card-label" data-key="lbl_total_gross"></div><div id="disp_gross" class="card-val">₺ 0.00</div></div>
                <div class="summary-card"><div class="card-label" data-key="lbl_total_net"></div><div id="disp_net" class="card-val" style="color:var(--green)">₺ 0.00</div></div>
            </div>
            <table class="data-table">
                <thead><tr><th data-key="th_gross"></th><th data-key="th_bonus"></th><th data-key="th_net_payout"></th></tr></thead>
                <tbody><tr><td><input type="number" id="in_gross" oninput="calculate()"></td><td><input type="number" id="in_bonus" oninput="calculate()"></td><td><input type="text" id="out_net" readonly></td></tr></tbody>
            </table>
        </div>

        <div id="severance" class="tab-content">
            <div class="summary-card"><div class="card-label" data-key="lbl_accrued_severance"></div><div id="disp_severance" class="card-val">₺ 0.00</div></div>
        </div>

        <div id="deductions" class="tab-content">
            <table class="data-table">
                <thead><tr><th data-key="th_deduction_type"></th><th data-key="th_amount"></th></tr></thead>
                <tbody id="ded_body"></tbody>
            </table>
            <button class="n-btn" onclick="addRow('ded_body', 2)" style="margin-top:10px;" data-key="btn_add_deduction">+ KESİNTİ EKLE</button>
        </div>

        <button class="save-btn" onclick="saveFinance()" data-key="btn_seal_fin"></button>
    </div>

<script src="dictionary.js"></script>
<script src="hr-storage.js"></script>
<script>
/** 🧬 FOR YOU FINANCIAL ENGINE v1.2 (GLOBAL SYNCED) **/

function calculate() {
    const gross = parseFloat(document.getElementById('in_gross').value) || 0;
    const bonus = parseFloat(document.getElementById('in_bonus').value) || 0;
    const net = (gross + bonus) * 0.73; // Statik katsayı (Vergi/SGK sonrası yaklaşık)
    document.getElementById('disp_gross').innerText = "₺ " + (gross + bonus).toFixed(2);
    document.getElementById('disp_net').innerText = "₺ " + net.toFixed(2);
    document.getElementById('out_net').value = net.toFixed(2);
    document.getElementById('disp_severance').innerText = "₺ " + ((gross/30)*365).toFixed(2); // Basit tazminat projeksiyonu
}

let isTranslating = false;
const observer = new MutationObserver(() => { if (!isTranslating) { isTranslating = true; applyLang(); setTimeout(() => isTranslating = false, 50); } });
observer.observe(document.body, { childList: true, subtree: true });

// SİSTEM DİL HAFIZASI (FY_LANG) İLE ENTEGRE EDİLDİ
function setLang(l) { localStorage.setItem('FY_LANG', l); applyLang(); }

function applyLang() {
    const lang = localStorage.getItem('FY_LANG') || 'tr';
    if (typeof FY_DICTIONARY === 'undefined') return;

    document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (FY_DICTIONARY[key] && FY_DICTIONARY[key][lang]) {
            const txt = FY_DICTIONARY[key][lang];
            if (el.tagName === 'INPUT') el.placeholder = txt; else el.innerHTML = txt;
        }
    });
    
    document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
    document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
}

function openTab(evt, tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    evt.currentTarget.classList.add('active');
}

function addRow(bodyId, colCount) {
    const tbody = document.getElementById(bodyId);
    const row = tbody.insertRow();
    for(let i=0; i<colCount; i++) row.insertCell().innerHTML = `<input type="text">`;
}

function saveFinance() { 
    const lang = localStorage.getItem('FY_LANG') || 'tr';
    alert(lang === 'tr' ? "FİNANSAL VERİLER MÜHÜRLENDİ." : "FINANCIAL DATA SEALED."); 
}

document.addEventListener('DOMContentLoaded', () => { applyLang(); addRow('ded_body', 2); });
</script>
</body>
</html>
