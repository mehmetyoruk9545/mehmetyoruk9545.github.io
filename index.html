<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR YOU ARK | The Sovereign Gateway</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.9); 
            --dark-box: #010203; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background-color: transparent; font-family: 'Garamond', serif; color: white; }
        body, html { height: 100%; overflow: hidden; background-color: transparent; font-family: 'Garamond', serif; color: white; max-width: 100%; overflow-x: hidden; touch-action: pan-y; }

        /* 🌊 OKYANUS - TAM NETLİK */
        #bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -100; filter: brightness(0.4) contrast(1.1); }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(1,2,4,0.2) 0%, rgba(1,2,4,0.9) 100%); z-index: -99; }

        /* 🖼️ PARLAK LİVİNG FRAME */
        .living-frame { 
            position: fixed; top: 15px; left: 15px; right: 15px; bottom: 15px; 
            pointer-events: none; z-index: 2000; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 30px var(--gold-glow), inset 0 0 20px var(--gold-glow); 
        }

        /* 🎭 TİYATRO PERDESİ */
        .curtain {
            position: fixed; top: 0; width: 50vw; height: 100vh; z-index: 10000;
            background: repeating-linear-gradient(to right, #1a0000 0%, #3a0000 4%, #5a0000 8%, #3a0000 12%, #1a0000 16%);
            box-shadow: inset 0 0 100px rgba(0,0,0,1); pointer-events: none;
        }
        
        .curtain-left { left: 0; transform: translateX(-100%); border-right: 15px solid var(--gold); transition: transform 0.8s ease-out; }
        .curtain-right { right: 0; transform: translateX(100%); border-left: 15px solid var(--gold); transition: transform 0.8s ease-out; }
        
        /* 1 Dakika Sonra Kapanma Animasyonu */
        .curtain.closing { transform: translateX(0); transition: transform 4s ease-in-out; }

        /* 👑 DEV MERKEZ LOGO & KALP ATIŞI */
        .center-hub { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(3.5); z-index: 20000; transition: all 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55); cursor: pointer; }
        
        /* Uyanış Modu: Logo Köşeye Gider */
        .center-hub.cornered { top: 60px; left: 60px; transform: translate(0, 0) scale(0.4); transform-origin: top left; }
        
        /* Uyku Modu: Perde Kapandığında Logo Tekrar Merkeze Döner */
        .center-hub.returning { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(3.5); }
        
        .main-logo { width: 140px; border: 2px solid var(--gold); border-radius: 50%; padding: 12px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); box-shadow: 0 0 30px var(--gold-glow); animation: heartbeat 2s infinite ease-in-out; }
        
        @keyframes heartbeat { 
            0% { transform: scale(1); box-shadow: 0 0 30px var(--gold-glow); } 
            50% { transform: scale(1.08); box-shadow: 0 0 60px var(--gold); } 
            100% { transform: scale(1); box-shadow: 0 0 30px var(--gold-glow); } 
        }

        /* 🌍 DİLLER & GÖRÜNÜM DEĞİŞTİRİCİ */
        .top-bar { position: fixed; top: 40px; right: 40px; z-index: 2500; display: flex; align-items: center; gap: 20px; transition: 1s; }
        .top-bar.hide-elements { transform: translateY(-100px); opacity: 0; pointer-events: none; }
        
        .lang-trigger { color: var(--gold); letter-spacing: 2px; font-size: 0.8rem; cursor: pointer; border-bottom: 1px solid var(--gold); padding-bottom: 3px; position: relative; }
        .lang-list { display: none; position: absolute; top: 25px; right: 0; background: rgba(0,0,0,0.95); padding: 15px; border: 1px solid var(--gold); border-radius: 4px; width: 120px; text-align: right; }
        .lang-trigger:hover .lang-list { display: block; }
        .lang-list span { display: block; color: #aaa; margin-bottom: 12px; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
        .lang-list span:hover { color: var(--gold); transform: translateX(-5px); }
        
        .btn-view-toggle { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 18px; cursor: pointer; letter-spacing: 2px; font-size: 0.7rem; font-family: 'Garamond', serif; transition: 0.3s; }
        .btn-view-toggle:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        .ai-indicator { position: fixed; bottom: 40px; left: 60px; z-index: 2500; color: var(--gold); font-size: 0.7rem; letter-spacing: 3px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 1s; }
        .ai-indicator.hide-elements { transform: translateY(100px); opacity: 0; pointer-events: none; }
        
        .ai-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 15px var(--gold); animation: ai-blink 2s infinite; }
        @keyframes ai-blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* 💎 SİNEMATİK MOD KÜRE VE KARTLAR */
        .scene { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; perspective: 2200px; display: flex; align-items: center; justify-content: center; z-index: 100; transition: 1.2s; }
        .scene.hide-elements { opacity: 0; transform: scale(0.8); pointer-events: none; }
        
        .carousel { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .crystal-face {
            position: absolute; width: 680px; height: 340px; left: calc(50% - 340px); top: calc(50% - 170px);
            position: absolute; 
            width: 85vw; 
            height: 42.5vw; 
            max-width: 680px;
            max-height: 340px;
            left: calc(50% - min(42.5vw, 340px));
            top: calc(50% - min(21.25vw, 170px));
            background: var(--dark-box); 
            border: 2px solid #fff; 
            border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 35px var(--gold-glow);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            backface-visibility: hidden;
            overflow: hidden;
        }
        .crystal-face:not(.active-face) { filter: brightness(0.4); border-color: var(--gold); pointer-events: none; }
        .crystal-face.active-face { filter: brightness(1.2); border-color: #fff; box-shadow: 0 0 70px var(--gold); transform: scale(1.08); background: #000; pointer-events: auto; }
        
        .crystal-face h2 { color: var(--gold); letter-spacing: 12px; font-size: 2.8rem; margin-bottom: 12px; text-transform: uppercase; text-align: center; }
        .crystal-face p { color: #eee; font-size: 1rem; letter-spacing: 4px; font-style: italic; text-align: center; padding: 0 20px; margin-bottom: 25px; }

        /* 🚀 KUTU İÇİ AKSİYON BUTONLARI */
        .action-btn {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); border-radius: 30px;
            color: var(--gold); padding: 12px 30px; cursor: pointer; transition: 0.4s;
            font-family: 'Garamond', serif; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase;
        }
        .action-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold-glow); transform: translateY(-3px); }

        /* ⚙️ KLASİK GÖRÜNÜM (İSİM KORUNDU) */
        #executive-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1500; background: rgba(0,0,0,0.98); backdrop-filter: blur(25px); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.8s; }
        #executive-view.active { opacity: 1; pointer-events: auto; }
        #executive-view.hide-elements { opacity: 0; pointer-events: none; }
        
        .exec-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 85%; }
        .exec-card { border: 1px solid var(--gold); padding: 35px; text-align: center; background: rgba(0,0,0,0.5); transition: 0.3s; cursor: pointer; }
        .exec-card:hover { background: rgba(212,175,55,0.1); border-color: #fff; transform: translateY(-5px); box-shadow: 0 0 20px var(--gold-glow); }

        /* MOBİL UYUM */
        @media (max-width: 768px) {
            .exec-grid { grid-template-columns: 1fr; width: 90%; padding-bottom: 50px; overflow-y: auto; max-height: 80vh; }
            .top-bar { top: 10px; right: 10px; flex-direction: column; align-items: flex-end; }
            .ai-indicator { bottom: 10px; left: 20px; }
            .crystal-face { width: 90vw; height: 50vh; left: 5vw; top: 25vh; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video"><source src="images/deniz.mp4" type="video/mp4"></video>
    <div class="overlay"></div>
    
    <div class="curtain curtain-left closing" id="curtain-l"></div>
    <div class="curtain curtain-right closing" id="curtain-r"></div>
    <div class="living-frame"></div>

    <div class="top-bar hide-elements" id="top-bar">
        <div class="lang-trigger">TR
            <div class="lang-list">
                <span>ENGLISH</span><span>DEUTSCH</span><span>FRANÇAIS</span><span>ESPAÑOL</span>
            </div>
        </div>
        <button class="btn-view-toggle" id="view-toggle-btn" onclick="toggleMode()">KLASİK GÖRÜNÜM</button>
    </div>

    <div class="ai-indicator hide-elements" id="ai-indicator">
        <div class="ai-dot"></div> AI AKTİF
    </div>

    <div class="center-hub returning" id="main-hub">
        <img src="images/foryou-logo.png" class="main-logo" id="gate-key" alt="ARK" title="Karargaha Gizli Giriş Protokolü">
    </div>

    <div class="scene hide-elements" id="cinematic-view">
        <div class="carousel" id="carousel"></div>
    </div>

    <div id="executive-view" class="hide-elements">
        <h1 style="color:var(--gold); letter-spacing: 20px; margin-bottom:40px;">KÜRESEL KARARGAH AĞI</h1>
        <div class="exec-grid" id="exec-grid"></div>
    </div>

    <script>
        const nodes = [
            // Müşteri alanı için eylem: SADECE BURADAN VAULT'A GİDİLİR
            { title: "AİLEMİZ", desc: "Münhasır Hizmetler & VIP Kalkan", btn: "SİSTEMİ KEŞFET (DEMO)", action: "window.location.href='vault.html'" },
            { title: "OPERASYON", desc: "Kriz Yönetimi & Stratejik Müdahale", btn: "KRİZ MERKEZİNE BAĞLAN", action: "alert('Kuleye şifreli bağlantı kuruluyor...')" },
            { title: "ÇÖZÜM ORTAKLARI", desc: "Küresel İttifak Ekosistemi", btn: "PARTNER AĞINI GÖR", action: "alert('Küresel İttifak Haritası Açılıyor...')" },
            { title: "YETENEK ÜSSÜ", desc: "Akademi & Geleceğin Mimarları", btn: "AKADEMİ & STAJ BAŞVURUSU", action: "alert('Akademi portalına yönlendiriliyorsunuz...')" },
            { title: "İLK TEMAS", desc: "Karargah Bağlantısı", btn: "GÜVENLİ İLETİŞİM HATTI", action: "alert('Uçtan uca şifreli iletişim kanalı açılıyor...')" },
            { title: "İLKELER VE ETİK", desc: "Manifesto & Kurumsal Felsefe", btn: "KURUMSAL MANİFESTO", action: "alert('DNA ve İlkelerimiz yükleniyor...')" },
            { title: "STANDARTLARIMIZ", desc: "Mahremiyet & Hukuki Zırh", btn: "HUKUKİ ZIRH PROTOKOLLERİ", action: "alert('Güvenlik standartları sayfası açılıyor...')" },
            { title: "VİZYON", desc: "Gelecek Hedefleri", btn: "GELECEK TASARIMI", action: "alert('Vizyon haritamız açılıyor...')" }
        ];

        const carousel = document.getElementById('carousel');
        const mainHub = document.getElementById('main-hub');
        const scene = document.getElementById('cinematic-view');
        const topBar = document.getElementById('top-bar');
        const aiIndicator = document.getElementById('ai-indicator');
        const execView = document.getElementById('executive-view');
        const curtainL = document.getElementById('curtain-l');
        const curtainR = document.getElementById('curtain-r');
        
        const theta = 360 / nodes.length; 
        const radius = Math.round((680 / 2) / Math.tan(Math.PI / nodes.length)) + 250; 
        const faceWidth = Math.min(window.innerWidth * 0.85, 680);
        const theta = 360 / nodes.length;
        const radius = Math.round((faceWidth / 2) / Math.tan(Math.PI / nodes.length)) + (window.innerWidth < 768 ? 150 : 250);
        
        let selectedIndex = 0;
        let activeAxis = 'Y';
        let idleTimer;
        let isCurtainClosed = true;
        let gateClickCount = 0;

        function init() {
            nodes.forEach((node, i) => {
                let face = document.createElement('div');
                face.className = 'crystal-face';
                face.style.transform = `rotateY(${i * theta}deg) translateZ(${radius}px)`;
                face.innerHTML = `<h2>${node.title}</h2><p>${node.desc}</p><button class="action-btn" onclick="${node.action}">${node.btn}</button>`;
                carousel.appendChild(face);

                let card = document.createElement('div');
                card.className = 'exec-card';
                card.innerHTML = `<h3 style="color:var(--gold); margin-bottom:10px;">${node.title}</h3><p style="font-size:0.8rem; color:#aaa;">${node.desc}</p>`;
                card.setAttribute('onclick', node.action); 
                document.getElementById('exec-grid').appendChild(card);
            });
            updateFaces();
        }

        // --- UYANIŞ PROTOKOLÜ ---
        function wakeUpSystem() {
            if (isCurtainClosed) {
                curtainL.classList.remove('closing');
                curtainR.classList.remove('closing');
                
                mainHub.classList.remove('returning');
                mainHub.classList.add('cornered'); 

                topBar.classList.remove('hide-elements');
                aiIndicator.classList.remove('hide-elements');
                scene.classList.remove('hide-elements');
                if(isExecView) execView.classList.remove('hide-elements');
                
                isCurtainClosed = false;
            }
            resetIdleTimer();
        }

        // --- UYKU PROTOKOLÜ (1 DAKİKA SONRA) ---
        function sleepSystem() {
            curtainL.classList.add('closing');
            curtainR.classList.add('closing');
            
            mainHub.classList.remove('cornered');
            mainHub.classList.add('returning');

            topBar.classList.add('hide-elements');
            aiIndicator.classList.add('hide-elements');
            scene.classList.add('hide-elements');
            execView.classList.add('hide-elements');
            
            isCurtainClosed = true;
        }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (!isCurtainClosed) {
                idleTimer = setTimeout(sleepSystem, 60000); // 60 Saniye
            }
        }

        // Fare hareketleri sistemi uyandırır
        ['mousemove', 'mousedown', 'touchstart', 'scroll'].forEach(event => {
            window.addEventListener(event, wakeUpSystem);
        });

        // --- GATEWAY (YETKİLİ) YÖNLENDİRMESİ ---
        function triggerGateway() {
            window.location.href = 'gateway.html';
        // --- 5 TIK GEÇİDİ (SOVEREIGN GATEWAY) ---
        function sovGate() {
            gateClickCount++;
            if (gateClickCount >= 5) {
                window.location.href = 'gateway.html';
            }
            setTimeout(() => { if (gateClickCount < 5) gateClickCount = 0; }, 3000);
        }

        // Logoya tıklandığında (ortada veya köşedeyken) sadece Gateway'e gider
        document.getElementById('gate-key').addEventListener('click', (e) => {
            e.stopPropagation(); // Diğer tıklamalarla çakışmayı önler
            triggerGateway();
            sovGate();
        });

        // --- KLAVYE KONTROLLERİ ---
        document.addEventListener('keydown', (e) => {
            wakeUpSystem(); // Tuşa basılınca önce perde açılır
            
            if (e.key === 'Enter') {
                triggerGateway(); // Enter tuşu Gateway'e atandı
            } else if (e.key === 'ArrowRight') {
            if (e.key === 'ArrowRight') {
                rotateSphere(1, 'Y');
            } else if (e.key === 'ArrowLeft') {
                rotateSphere(-1, 'Y');
            } else if (e.key === 'ArrowUp') {
                rotateSphere(1, 'X');
            } else if (e.key === 'ArrowDown') {
                rotateSphere(-1, 'X');
            }
        });

        // --- DOKUNMATİK HAREKET (MOBİL) ---
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        const swipeThreshold = 50; // Kaydırma olarak algılanacak minimum piksel

        document.body.addEventListener('touchstart', (e) => {
            if (e.target.closest('#gate-key')) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.body.addEventListener('touchend', (e) => {
            if (e.target.closest('#gate-key')) return;
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (Math.abs(deltaX) > swipeThreshold) {
                    if (deltaX > 0) { rotateSphere(-1, 'Y'); } // Sağa kaydırma (sola döndür)
                    else { rotateSphere(1, 'Y'); } // Sola kaydırma (sağa döndür)
                }
            } else { // Dikey kaydırma
                if (Math.abs(deltaY) > swipeThreshold) {
                    if (deltaY > 0) { rotateSphere(-1, 'X'); } // Aşağı kaydırma (yukarı döndür)
                    else { rotateSphere(1, 'X'); } // Yukarı kaydırma (aşağı döndür)
                }
            }
        }


        function rotateSphere(dir, requestedAxis) {
            if (activeAxis !== requestedAxis) {
                activeAxis = requestedAxis;
                document.querySelectorAll('.crystal-face').forEach((face, i) => {
                    face.style.transform = activeAxis === 'Y' 
                        ? `rotateY(${i * theta}deg) translateZ(${radius}px)` 
                        : `rotateX(${i * -theta}deg) translateZ(${radius}px)`;
                });
            }
            selectedIndex += dir;
            carousel.style.transform = activeAxis === 'Y' 
                ? `translateZ(${-radius}px) rotateY(${selectedIndex * -theta}deg)` 
                : `translateZ(${-radius}px) rotateX(${selectedIndex * theta}deg)`;
            updateFaces();
        }

        function updateFaces() {
            const faces = document.querySelectorAll('.crystal-face');
            faces.forEach((f, i) => {
                f.classList.remove('active-face');
                if (activeAxis === 'Y') f.style.transform = `rotateY(${i * theta}deg) translateZ(${radius}px) scale(0.9)`;
                else f.style.transform = `rotateX(${i * -theta}deg) translateZ(${radius}px) scale(0.9)`;
            });
            let actualIndex = ((selectedIndex % 8) + 8) % 8; 
            let targetIndex = actualIndex === 0 ? 0 : 8 - actualIndex; 
            if(faces[targetIndex]) {
                faces[targetIndex].classList.add('active-face');
                if (activeAxis === 'Y') faces[targetIndex].style.transform = `rotateY(${targetIndex * theta}deg) translateZ(${radius}px) scale(1.08)`;
                else faces[targetIndex].style.transform = `rotateX(${targetIndex * -theta}deg) translateZ(${radius}px) scale(1.08)`;
            }
        }

        // 🔄 DİNAMİK YAZILI GÖRÜNÜM DEĞİŞTİRİCİ
        let isExecView = false;
        function toggleMode() { 
            isExecView = !isExecView;
            if(isExecView) {
                execView.classList.add('active');
                execView.classList.remove('hide-elements');
            } else {
                execView.classList.remove('active');
                execView.classList.add('hide-elements');
            }
            const btn = document.getElementById('view-toggle-btn');
            btn.innerText = isExecView ? "SİNEMATİK KÜRE GÖRÜNÜMÜ" : "KLASİK GÖRÜNÜM";
            resetIdleTimer();
        }

        // GÜVENLİK: İLERİ / GERİ TUŞ İPTALİ
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        init();
        carousel.style.transform = `translateZ(${-radius}px) rotateY(0deg)`;
        
        // Başlangıçta sistem uykudadır (Perde kapalı, logo ortada). Fare hareket edince uyanır.
    </script>
</body>
</html>
