<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR YOU | Secure Global Tri-Gate v7.8 (Auto-Diagnostic)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #020205; --neon-blue: #00ffff; --glass: rgba(10, 10, 15, 0.95); --red: #ff3333; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        .nebula { position: fixed; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #0a1128 0%, #020205 100%); }
        .gate-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; padding: 40px 20px; width: 100%; max-width: 1200px; }
        .gate-card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.3); padding: 40px 30px; border-radius: 20px; width: 340px; text-align: center; backdrop-filter: blur(20px); transition: 0.5s; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); letter-spacing: 5px; margin-bottom: 25px; }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 14px; color: #fff; border-radius: 8px; outline: none; box-sizing: border-box; font-size: 13px; }
        input:focus { border-color: var(--gold); }
        .eye-btn { position: absolute; right: 12px; top: 12px; cursor: pointer; color: var(--gold); font-size: 16px; opacity: 0.7; }
        .btn-gate { width: 100%; padding: 16px; background: none; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-weight: bold; letter-spacing: 3px; transition: 0.3s; text-transform: uppercase; border-radius: 8px; }
        .btn-gate:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }
        .step-info { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        
        #protocol_overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .otp-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .otp-val { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; font-size: 11px; }

        .lang-switch { position: fixed; top: 20px; right: 20px; display: flex; gap: 4px; z-index: 2001; }
        .l-btn { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; transition: 0.3s; }
        .l-btn.active { background: var(--gold); color: #000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="nebula"></div>

    <div class="lang-switch">
        <button class="l-btn active" onclick="setLang('tr')">TR</button>
        <button class="l-btn" onclick="setLang('en')">EN</button>
        <button class="l-btn" onclick="setLang('ru')">RU</button>
        <button class="l-btn" onclick="setLang('zh')">ZH</button>
        <button class="l-btn" onclick="setLang('ar')">AR</button>
        <button class="l-btn" onclick="setLang('de')">DE</button>
        <button class="l-btn" onclick="setLang('fr')">FR</button>
        <button class="l-btn" onclick="setLang('es')">ES</button>
    </div>

    <div class="gate-container">
        <div class="gate-card">
            <div class="logo">STAFF</div>
            <div class="step-info" data-key="info_dna">DNA ERİŞİM NOKTASI</div>
            <input type="text" id="staff_id" data-key="ph_staff_id" placeholder="T.C. / SİCİL NO" maxlength="11" oninput="this.value=this.value.replace(/[^0-9a-zA-Z-]/g,'');">
            <div class="input-group">
                <input type="password" id="staff_pass" data-key="ph_pass" placeholder="ŞİFRE">
                <span class="eye-btn" onclick="toggleView('staff_pass')">👁️</span>
            </div>
            <button class="btn-gate" onclick="handleStaffLogin()" data-key="btn_verify">SİSTEMİ DOĞRULA</button>
        </div>

        <div class="gate-card">
            <div class="logo">PARTNER</div>
            <div class="step-info" data-key="info_partner">İŞ ORTAĞI</div>
            <input type="text" data-key="ph_partner" placeholder="PARTNER ID">
            <button class="btn-gate" onclick="alert('Access Pending...')" data-key="btn_login">LOGIN</button>
        </div>

        <div class="gate-card">
            <div class="logo">CLIENT</div>
            <div class="step-info" data-key="info_client">VIP MÜŞTERİ</div>
            <input type="text" data-key="ph_client" placeholder="CLIENT NO">
            <button class="btn-gate" onclick="alert('Access Pending...')" data-key="btn_vip">VIP ACCESS</button>
        </div>
    </div>

    <div id="protocol_overlay">
        <div class="gate-card" style="width: 450px; border-color: var(--neon-blue);">
            <div class="logo" style="color:var(--neon-blue); font-size: 18px;" data-key="title_secure">SECURE PROTOCOL</div>
            
            <div class="otp-box">
                <div class="otp-val">TEL: <b id="val_tel">---</b></div>
                <div class="otp-val">MAIL: <b id="val_mail">---</b></div>
            </div>

            <div class="otp-box">
                <input type="text" id="in_tel" data-key="ph_tel_code" placeholder="TEL KODU">
                <input type="text" id="in_mail" data-key="ph_mail_code" placeholder="MAIL KODU">
            </div>

            <div id="first_login_fields" style="display:none;">
                <div class="input-group">
                    <input type="password" id="np1" data-key="ph_new_pass" placeholder="YENİ GÜÇLÜ ŞİFRE">
                    <span class="eye-btn" onclick="toggleView('np1')">👁️</span>
                </div>
                <div class="input-group">
                    <input type="password" id="np2" data-key="ph_pass_repeat" placeholder="ŞİFRE TEKRAR">
                    <span class="eye-btn" onclick="toggleView('np2')">👁️</span>
                </div>
                <input type="text" id="custom_q" data-key="ph_secret_q" placeholder="KENDİ GİZLİ SORUNUZU YAZIN">
            </div>

            <div id="normal_login_fields" style="display:none; margin-bottom:15px;">
                <div id="display_q" style="font-size:11px; color:var(--gold); margin-bottom:10px;" data-key="lbl_secret_question">GİZLİ SORU YÜKLENİYOR...</div>
            </div>

            <input type="text" id="in_answer" data-key="ph_secret_ans" placeholder="GİZLİ CEVAP">
            
            <button class="btn-gate" onclick="finalizeSecurity()" style="margin-top:10px;" data-key="btn_seal">PROTOKOLÜ MÜHÜRLE</button>
        </div>
    </div>

<script src="dictionary.js"></script>
<script src="hr-storage.js"></script>
<script>
    // 🛡️ NAVİGASYON KİLİDİ
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() {
        window.history.pushState(null, null, window.location.href);
        alert("GÜVENLİK İHLALİ: Navigasyon tuşları bu sistemde geçersizdir!");
    };

    let activeUser = null, otpTel = "", otpMail = "";

    function toggleView(id) {
        const el = document.getElementById(id);
        el.type = el.type === "password" ? "text" : "password";
    }

    // 🌍 GÜVENLİ DİL MOTORU (GÜÇLENDİRİLMİŞ)
    function setLang(l) { 
        localStorage.setItem('FY_LANG', l); 
        applyLang(); 
    }

    function applyLang() {
        const lang = localStorage.getItem('FY_LANG') || 'tr';
        document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
        
        if (typeof FY_DICTIONARY === 'undefined') return;

        document.querySelectorAll('[data-key]').forEach(el => {
            const k = el.getAttribute('data-key');
            if (FY_DICTIONARY[k] && FY_DICTIONARY[k][lang]) {
                const text = FY_DICTIONARY[k][lang];
                if (el.tagName === 'INPUT') el.placeholder = text;
                else el.innerHTML = text;
            }
        });
    }

    // 🛡️ OTO-DİAGNOSTİK GİRİŞ SİSTEMİ
    function handleStaffLogin() {
        try {
            const id = document.getElementById('staff_id').value;
            const pass = document.getElementById('staff_pass').value;

            if (!id || !pass) {
                alert(FY_DICTIONARY.empty_fields ? FY_DICTIONARY.empty_fields[localStorage.getItem('FY_LANG') || 'tr'] : "Lütfen T.C. Kimlik ve Şifre alanlarını boş bırakmayın.");
                return;
            }

            if (typeof FOR_YOU_STORAGE === 'undefined') {
                alert("KRİTİK HATA 01: 'hr-storage.js' dosyası okunmuyor!");
                return;
            }

            if (typeof FOR_YOU_STORAGE.verifyLogin !== 'function') {
                alert("KRİTİK HATA 02: 'hr-storage.js' eski sürümde. verifyLogin fonksiyonu bulunamıyor.");
                return;
            }

            const res = FOR_YOU_STORAGE.verifyLogin(id, pass);
            
            if(res.success) {
                activeUser = res.data;
                document.getElementById('protocol_overlay').style.display = 'flex';
                
                otpTel = Math.floor(100000 + Math.random() * 900000).toString();
                otpMail = Math.floor(100000 + Math.random() * 900000).toString();
                document.getElementById('val_tel').innerText = otpTel;
                document.getElementById('val_mail').innerText = otpMail;

                if(activeUser.isFirstLogin) {
                    document.getElementById('first_login_fields').style.display = 'block';
                    document.getElementById('normal_login_fields').style.display = 'none';
                } else {
                    document.getElementById('first_login_fields').style.display = 'none';
                    document.getElementById('normal_login_fields').style.display = 'block';
                }
            } else { 
                const tempPass = "TEMP-" + new Date().getFullYear();
                alert("DNA ANAHTARI VEYA ŞİFRE HATALI!\n\n(Not: Yeni personelseniz ilk şifreniz: " + tempPass + ")");
            }
        } catch (error) {
            alert("MOTOR ÇÖKMESİ: " + error.message);
        }
    }

    function finalizeSecurity() {
        const ot1 = document.getElementById('in_tel').value;
        const ot2 = document.getElementById('in_mail').value;
        const ans = document.getElementById('in_answer').value;

        if(ot1 !== otpTel || ot2 !== otpMail) { 
            alert("DOĞRULAMA KODLARI HATALI!"); 
            return; 
        }

        if(activeUser.isFirstLogin) {
            const p1 = document.getElementById('np1').value;
            const p2 = document.getElementById('np2').value;
            const q = document.getElementById('custom_q').value;
            
            if(p1 !== p2) { alert("ŞİFRELER UYUŞMUYOR!"); return; }
            
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!"#$%&'()*+,\-./:;<=>?@[\\\]^_`{|}~])[A-Za-z\d!"#$%&'()*+,\-./:;<=>?@[\\\]^_`{|}~]{8,}$/;
            if(!regex.test(p1)) { alert("ŞİFRE KRİTERLERİNE UYMUYOR!\n(En az 8 karakter, 1 Büyük, 1 Küçük, 1 Rakam, 1 Özel Karakter)"); return; }

            FOR_YOU_STORAGE.sealCryptoProtocol(activeUser.tcNo, p1, q, ans);
            alert("DNA MÜHÜRLENDİ. GİRİŞ YAPILIYOR...");
            location.href = 'fy-admin-hq.html';
        } else {
            if(ans === activeUser.secretAnswer) {
                alert("DOĞRULAMA BAŞARILI. KARARGAHA GİRİLİYOR...");
                location.href = 'fy-admin-hq.html';
            } else { alert("GİZLİ CEVAP HATALI!"); }
        }
    }

    window.onload = () => { applyLang(); };
</script>
</body>
</html>
